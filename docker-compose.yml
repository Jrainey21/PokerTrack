services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pokertrack-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Password"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
      - ./db:/init
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql/bin/sqlservr &
        sleep 25
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Password" -No -i /init/init.sql
        /opt/mssql/bin/mssql-conf set sqlagent.enabled true
        wait

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pokertrack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pokertrack-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://pokertrack-kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  debezium:
    image: debezium/connect:2.6
    container_name: pokertrack-debezium
    depends_on:
      - kafka
      - sql
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: pokertrack-kafka:29092
      GROUP_ID: debezium
      CONFIG_STORAGE_TOPIC: debezium.configs
      OFFSET_STORAGE_TOPIC: debezium.offsets
      STATUS_STORAGE_TOPIC: debezium.status
    volumes:
      - ./debezium:/connector

  connector-init:
    image: curlimages/curl:latest
    container_name: pokertrack-connector-init
    depends_on:
      - debezium
    volumes:
      - ./debezium:/connector
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Debezium..."
        until curl -s http://pokertrack-debezium:8083/connectors > /dev/null 2>&1; do
          sleep 5
        done
        sleep 5
        STATUS=$$(curl -s -o /dev/null -w "%{http_code}" http://pokertrack-debezium:8083/connectors/pokertrack-sessions-connector)
        if [ "$$STATUS" = "200" ]; then
          echo "Connector already registered."
        else
          echo "Registering connector..."
          curl -X POST http://pokertrack-debezium:8083/connectors \
            -H "Content-Type: application/json" \
            -d @/connector/connector.json
          echo "Done."
        fi

volumes:
  sql-data: